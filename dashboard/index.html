<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플랜티넷 BSIS · 로그인</title>
<link rel="stylesheet" href="/assets/shell.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#f5f7fa;color:#111;font-family:"Segoe UI","Malgun Gothic",sans-serif}
  .login-wrap{max-width:400px;margin:72px auto;padding:0 20px}
  .login-box{background:#fff;border:1px solid #e2e6ed;border-radius:12px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,.05)}
  .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .login-logo .site-logo{width:36px;height:36px;font-size:15px}
  .login-logo h1{font-size:18px;font-weight:700}
  .login-logo p{font-size:12px;color:#6b7280;margin-top:2px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#374151}
  input{width:100%;padding:11px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:16px;font-family:inherit}
  input:focus{outline:2px solid #2563eb;border-color:#2563eb}
  .btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{background:#333}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .err{display:none;margin-top:14px;padding:11px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:13px;color:#b91c1c;line-height:1.5}
  .err.show{display:block}
  .note{margin-top:20px;font-size:12px;color:#6b7280;line-height:1.6;text-align:center}
  .foot{text-align:center;margin-top:32px;font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="site-logo">B</span>
      <div>
        <h1>플랜티넷 BSIS</h1>
        <p>관리회계 · 손익 분석</p>
      </div>
    </div>
    <form id="loginForm">
      <label for="username">아이디</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit" class="btn" id="submitBtn">로그인</button>
    </form>
    <div class="err" id="errBox"></div>
    <p class="note">허용된 IP에서만 접속할 수 있습니다.<br>접속이 안 되면 관리자에게 IP 등록을 요청하세요.</p>
  </div>
  <p class="foot">플랜티넷 BSIS · 26년04월 관리회계</p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var err = document.getElementById('errBox');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '확인 중…';
  try {
    var res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (!res.ok) {
      var msg = data.error || '로그인에 실패했습니다.';
      if (data.ip) msg += ' (현재 IP: ' + data.ip + ')';
      err.textContent = msg;
      err.classList.add('show');
      return;
    }
    location.href = data.redirect || '/손익요약_대시보드';
  } catch (ex) {
    err.textContent = '서버 연결에 실패했습니다.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
});
</script>
</body>
</html>
