<!DOCTYPE html>
<html lang="ko">
<head>

<title>플랜티넷 BSIS 손익 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI","Malgun Gothic",sans-serif;background:#f5f7fa;color:#1a2332;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{max-width:520px;width:100%;background:#fff;border:1px solid #e2e6ed;border-radius:16px;padding:32px 28px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  h1{font-size:22px;margin-bottom:8px}
  p{color:#667085;font-size:14px;margin-bottom:24px;line-height:1.5}
  a{display:block;padding:14px 18px;margin-bottom:10px;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;border:1px solid #e2e6ed;color:#1a2332;transition:background .15s}
  a:hover{background:#f0f4ff;border-color:#2563eb}
  a.primary{background:#2563eb;color:#fff;border-color:#2563eb}
  a.primary:hover{background:#1d4ed8}
  .sub{font-size:12px;color:#667085;font-weight:400;margin-top:4px}
</style>
</head>
<body>
<div class="box">
  <h1>플랜티넷 BSIS</h1>
  <p>26년04월 관리회계 · 월별손익 기준 HTML 대시보드</p>
  <a class="primary" href="/손익요약_대시보드">손익 요약 대시보드<span class="sub">사업부 / 임대 / 회사 롤업</span></a>

  <a href="/월별손익_대시보드">월별손익 상세 대시보드<span class="sub">월별 · 부문 · 부서 상세</span></a>
</div>
</body>
</html>
